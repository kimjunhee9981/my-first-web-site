<h2>JavaScript</h2>
<p>JavaScript는 웹 브라우저에서 동작하는 스크립트 언어로, 웹 페이지에 동적인 기능을 추가하는 데 사용됩니다. HTML은 구조를 정의하고 CSS는 디자인을 담당한다면, JavaScript는 웹 페이지의 동작을 제어합니다. 예를 들어, 버튼 클릭 시 특정 작업을 수행하거나, 사용자 입력에 따라 화면을 업데이트하는 등의 기능을 제공합니다.</p>
