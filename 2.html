<h2>CSS</h2>
<p>CSS(Cascading Style Sheets)는 HTML 문서의 
스타일(글꼴, 색상, 레이아웃 등)을 
    정의하여 웹 페이지를 꾸미고 배치하는 스타일 
    시트 언어입니다. HTML이 구조(뼈대)라면 CSS는 디자인(외관)을 담당하며, 
    문서의 내용과 표현을 분리하여 유지보수를 효율적으로 만듭니다. 1996년 W3C가 
    표준으로 도입하여 보편적으로 사용되고 있습니다. </p>
